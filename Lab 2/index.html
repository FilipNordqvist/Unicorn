<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Unicorns</title>
    <style>
        th,
        td {
            border: 1px solid black;
            padding: 40px;
            text-align: left;
            vertical-align: top;
            width: 1200px;

        }

        table {
            border-spacing: 10px;
        }

        li {
            cursor: pointer;
        }

        #list {
            width: 300px;
        }
    </style>
</head>

<body>
    <h1>Unicorns</h1>
    <table>
        <tr>
            <th>
                <ul id="list">
                    <li><a href="">Enhörning 1</a></li>
                    <li><a href="">Enhörning 2</a></li>
                    <li><a href="">Enhörning 3</a></li>

                </ul>
            </th>
            <th id="unicornName">Här lägger vi info om en stund</th>
            <span id="unicornImage"></span>
            <p id="unicornInfo"></p>
            <p id="unicornSighting"></p>
        </tr>
    </table>

    <script>

        async function listUnicorns() {
            try {
                const response = await fetch("http://unicorns.idioti.se/", {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                const unicorns = await response.json();
                const ul = document.getElementById("list");

                //Tar bort de enhörningar som finns innan loopen startar
                ul.replaceChildren();

                //Itererar över datan som hämtas
                unicorns.forEach(unicorn => {
                    //Skapar ett li-element
                    const li = document.createElement("li");
                    //Sätter namn attribut
                    li.setAttribute("name", "unicorn_" + unicorn.id);

                    //Sätter enhörningens id som värde
                    li.value = unicorn.id;

                    //Sätter enhörningsnamn till elementet
                    li.textContent = unicorn.name;

                    li.onclick = () => fetchThenDisplayUnicorn(unicorn.id);

                    //Lägger till elementet i listan
                    ul.appendChild(li);

                    //console.log("ID: " + unicorn.id + " Namn: " + unicorn.name + " Detaljer: " + unicorn.details)
                });
            } catch (error) {
                console.error("Hoppsan, något gick fel:", error);
            }

        }
        
        async function fetchThenDisplayUnicorn(event) {
            try {
                const response = await fetch("http://unicorns.idioti.se/"+event, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                const unicorn = await response.json();
                displayUnicorn(unicorn);

            }catch(error){
                console.log("Kunde inte visa enhörningsinformation", error)
            }

            console.log(event)
        }

        async function displayUnicorn(unicorn){

            const unicornName = document.getElementById("unicornName");
            unicornName.textContent = unicorn.name
            const info = document.getElementById("unicornInfo");
            info.textContent = unicorn.id
            const image = document.getElementById("unicornImage");
            const unicornImage = document.createElement("src");
            unicornImage.textContent = unicorn.image
            
            
            
            
            console.log("Namn: " + unicorn.name + '\n' +
                "Detaljer: " + unicorn.description + '\n' +
                "Rapporterad av: " + unicorn.reportedBy + '\n' +
                "image: " + unicorn.image)
        }

        listUnicorns();

    </script>

</body>

</html>
